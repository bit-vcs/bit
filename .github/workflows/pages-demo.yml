name: Pages Demo

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages-demo.yml"
      - "docs/demo/**"
      - "docs/playground/**"
      - "playground/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.playground.config.mjs"
      - "justfile"
      - "moon.mod.json"
      - "src/lib/**"
      - "tools/bit-git.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-demo
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Moon update
        run: moon update

      - name: Install playground dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild checked-in browser bundles
        run: |
          just build-docs-demo
          just build-docs-playground

      - name: Verify checked-in bundles are up to date
        run: git diff --exit-code -- docs/demo/app.js docs/playground
