name: Setup MoonBit (pinned via nix overlay)
description: >
  Provide the MoonBit toolchain from moonbit-overlay, pinned to a specific
  revision. MoonBit's curl installer only fetches `latest`/`nightly` (no
  version pinning, see cli.moonbitlang.com returning 403 for version strings),
  and bleeding-edge releases repeatedly broke CI: async [3002], the $|/#|
  syntax_lint [0063], and the `moon test` working-directory change in
  0.1.20260618 that broke bit_pack's repo-root-relative fixtures. Pinning the
  overlay rev freezes the toolchain to a known-good build; bump `overlay-rev`
  (and re-validate) to upgrade intentionally.
inputs:
  overlay-rev:
    description: >
      moonbit-overlay git revision whose `#default` toolchain is installed.
      Default provides moon 0.1.20260608 (the last build before the
      0.1.20260618 moon-test CWD regression), verified to build the workspace
      and pass `moon test`.
    required: false
    default: "96727d9f3962fffe8342713f94bd714f81a00c6b"
runs:
  using: composite
  steps:
    - name: Install Nix (with store cache)
      uses: ./.github/actions/setup-nix
    - name: Install pinned MoonBit toolchain
      shell: bash
      run: |
        nix profile install \
          --extra-experimental-features 'nix-command flakes' \
          "github:moonbit-community/moonbit-overlay/${{ inputs.overlay-rev }}#default"
        echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
